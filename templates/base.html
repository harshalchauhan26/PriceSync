<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}PriceSync{% endblock %}</title>
<style>
  :root{
    --bg:#0a0d13; --panel:#11151f; --panel2:#161b27; --border:#232a3a;
    --text:#c9d4e3; --dim:#6b7689; --purple:#7c5cff; --purple2:#5a3fe0;
    --green:#3fb950; --red:#f85149; --orange:#d29922; --blue:#58a6ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:"Segoe UI",system-ui,sans-serif;
    font-size:14px;display:flex;height:100vh;overflow:hidden}
  a{color:inherit;text-decoration:none}
  .mono{font-family:Consolas,"Courier New",monospace}

  /* ---- left nav ---- */
  #nav{width:212px;min-width:212px;background:var(--panel);border-right:1px solid var(--border);
    display:flex;flex-direction:column;padding:16px 12px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:16px;
    letter-spacing:.5px;padding:6px 8px 16px}
  .brand .logo{width:26px;height:26px;border-radius:7px;
    background:linear-gradient(135deg,var(--purple),#3aa0ff);display:flex;
    align-items:center;justify-content:center;font-size:15px}
  .brand b{color:#fff} .brand span{color:var(--purple)}
  .navlink{display:flex;align-items:center;gap:10px;padding:10px 11px;border-radius:8px;
    color:var(--dim);font-weight:600;font-size:13px;margin-bottom:3px;cursor:pointer}
  .navlink:hover{background:var(--panel2);color:var(--text)}
  .navlink.active{background:rgba(124,92,255,.14);color:#fff}
  .navlink .ic{width:18px;text-align:center}
  .navlink .pill{margin-left:auto;font-size:10.5px;font-family:Consolas,monospace;
    background:var(--panel2);border:1px solid var(--border);border-radius:20px;padding:1px 7px;color:var(--dim)}
  .nav-spacer{flex:1}
  .nav-foot{font-size:10.5px;color:var(--dim);padding:10px 8px;border-top:1px solid var(--border)}
  .nav-foot .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);
    margin-right:6px;box-shadow:0 0 0 0 rgba(63,185,80,.6);animation:pulse 2s infinite}

  /* ---- content ---- */
  #content{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .topbar{display:flex;align-items:center;justify-content:space-between;
    padding:14px 22px;border-bottom:1px solid var(--border);background:var(--panel)}
  .topbar h1{font-size:14px;letter-spacing:1.5px;color:var(--dim);font-weight:700}
  .topbar .sub{font-size:11.5px;color:var(--dim)}
  .page{flex:1;overflow:auto;padding:18px 22px}

  /* ---- shared components ---- */
  .stats{display:grid;gap:12px;margin-bottom:16px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:11px 14px}
  .card .k{font-size:10px;letter-spacing:1.1px;color:var(--dim);margin-bottom:5px}
  .card .v{font-size:23px;font-weight:700;font-family:Consolas,monospace}
  .v.green{color:var(--green)} .v.red{color:var(--red)} .v.orange{color:var(--orange)} .v.blue{color:var(--blue)}
  .btn{padding:8px 15px;border-radius:7px;border:1px solid var(--border);background:var(--panel2);
    color:var(--text);font-size:12.5px;font-weight:600;cursor:pointer}
  .btn:hover{border-color:var(--purple)} .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn.primary{background:var(--purple2);border-color:var(--purple2);color:#fff}
  .btn.go{background:#1d6b2e;border-color:#2ea043;color:#fff}
  .btn.warn{background:#7a5310;border-color:var(--orange);color:#fff}
  .btn.red{background:var(--red);border-color:var(--red);color:#fff}
  .btn.push{background:#0b5d4a;border-color:#1aa179;color:#fff}
  .btn.sm{padding:5px 10px;font-size:11.5px}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  label.fld{display:block;font-size:11px;color:var(--dim);margin:13px 0 5px}
  input[type=text],input[type=number],input[type=password],select{
    width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);
    border-radius:6px;padding:7px 9px;font-size:13px;font-family:Consolas,monospace;outline:none}
  input:focus,select:focus{border-color:var(--purple)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--border);
    border-radius:10px;overflow:hidden}
  th{text-align:left;font-size:10px;letter-spacing:1.1px;color:var(--dim);padding:9px 12px;
    background:var(--panel);border-bottom:1px solid var(--border);position:sticky;top:0}
  td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:12.5px}
  tr:last-child td{border-bottom:none}
  td a.plink{color:var(--blue)} td a.plink:hover{text-decoration:underline}
  .num{font-family:Consolas,monospace;text-align:right}
  .badge{display:inline-block;padding:1.5px 8px;border-radius:4px;font-size:10px;font-weight:700;
    letter-spacing:.6px;text-transform:uppercase}
  .badge.shopify{background:rgba(124,92,255,.14);color:#a78bfa}
  .badge.wordpress,.badge.woocommerce{background:rgba(88,166,255,.12);color:var(--blue)}
  .badge.custom{background:rgba(210,153,34,.13);color:var(--orange)}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:700}
  .pill.pending{background:rgba(210,153,34,.13);color:var(--orange)}
  .pill.approved{background:rgba(63,185,80,.14);color:var(--green)}
  .pill.rejected{background:rgba(248,81,73,.13);color:var(--red)}
  input.mini{width:84px;background:var(--panel2);border:1px solid var(--border);color:var(--text);
    border-radius:5px;padding:5px 7px;font-size:12px;font-family:Consolas,monospace}
  select.mini{width:auto;padding:5px 6px;font-size:12px}
  .delta.up{color:var(--red)} .delta.down{color:var(--green)}
  .final{color:var(--green);font-weight:700}
  .rowact{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .hint{font-size:11px;color:var(--dim)}
  .empty{text-align:center;color:var(--dim);padding:40px;font-size:13px}
  .bar{height:9px;background:var(--panel2);border-radius:6px;overflow:hidden;border:1px solid var(--border)}
  .bar>div{height:100%;width:0;background:var(--purple);transition:width .4s}
  #msg{margin-top:12px;font-size:12px;color:var(--dim);min-height:16px}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,185,80,.5)}
    70%{box-shadow:0 0 0 6px rgba(63,185,80,0)}100%{box-shadow:0 0 0 0 rgba(63,185,80,0)}}
  {% block style %}{% endblock %}
</style>
</head>
<body>
  <nav id="nav">
    <div class="brand"><span class="logo">⚡</span><div><b>Price</b><span>Sync</span></div></div>
    <a class="navlink {{'active' if active=='pipeline' else ''}}" href="/pipeline"><span class="ic">▶</span>Pipeline</a>
    <a class="navlink {{'active' if active=='review' else ''}}" href="/review"><span class="ic">✓</span>Review &amp; Approve<span class="pill" id="navAwait">0</span></a>
    <a class="navlink {{'active' if active=='integrations' else ''}}" href="/integrations"><span class="ic">🔌</span>Integrations</a>
    <div class="nav-spacer"></div>
    <div class="nav-foot"><span class="dot"></span>SQLite-backed · live<div id="navMeta" style="margin-top:6px"></div></div>
  </nav>
  <div id="content">
    <div class="topbar">
      <h1>{% block heading %}{% endblock %}</h1>
      <div class="sub" id="topSub">{% block subheading %}{% endblock %}</div>
    </div>
    <div class="page">{% block content %}{% endblock %}</div>
  </div>
<script>
const $ = id => document.getElementById(id);
const fmt = n => (n===null||n===undefined||n==="") ? "—"
  : Number(n).toLocaleString(undefined,{maximumFractionDigits:2});
function badge(p){p=(p||"?").toLowerCase();return `<span class="badge ${p}">${p}</span>`}
function plink(u){if(!u)return "—";let l=u.replace(/^https?:\/\//,"");
  if(l.length>50)l=l.slice(0,47)+"…";return `<a class="plink" href="${u}" target="_blank" title="${u}">${l}</a>`}
async function refreshNav(){
  try{const d=await (await fetch("/api/meta")).json();
    $("navAwait").textContent=d.counts.awaiting||0;
    if(d.last_import) $("navMeta").textContent="imported "+d.last_import_rows+" rows · "+d.last_import;
  }catch(e){}
}
refreshNav(); setInterval(refreshNav,8000);
</script>
{% block script %}{% endblock %}
</body>
</html>
