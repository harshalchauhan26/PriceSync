<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PriceSync · Console</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<!-- Pinned to Babel 7: its preset-react defaults to the classic JSX runtime.
     Babel 8 (the unversioned "latest") emits `import` statements that can't run
     as a plain inline script, which blanks the whole page. -->
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root{--bg:#09090b;--panel:#121214;--panel2:#18181b;--border:#27272a;
    --blue:#2563eb;--emerald:#10b981;--amber:#f59e0b;--red:#ef4444;--mut:#71717a;}
  html,body{height:100%;background:var(--bg);color:#e4e4e7;
    font-family:Inter,"SF Pro Display",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  *{scrollbar-width:thin;scrollbar-color:#3f3f46 transparent}
  *::-webkit-scrollbar{width:8px;height:8px}
  *::-webkit-scrollbar-thumb{background:#3f3f46;border-radius:8px}
  *::-webkit-scrollbar-track{background:transparent}
  @keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
  .shine::after{content:"";position:absolute;inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
    animation:shimmer 1.6s infinite}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .fadeup{animation:fadeUp .25s ease both}
  @keyframes slideIn{from{opacity:0;transform:translateX(40px) scale(.98)}
    60%{transform:translateX(-4px) scale(1.01)}to{opacity:1;transform:translateX(0) scale(1)}}
  .toastin{animation:slideIn .35s cubic-bezier(.22,1.2,.36,1) both}
  @keyframes pulseDot{0%{box-shadow:0 0 0 0 rgba(16,185,129,.55)}
    70%{box-shadow:0 0 0 6px rgba(16,185,129,0)}100%{box-shadow:0 0 0 0 rgba(16,185,129,0)}}
  .pdot{animation:pulseDot 2s infinite}
  .acc{overflow:hidden;transition:max-height .3s ease}
  .navi{transition:background .2s ease,color .2s ease}
  input,select,button{outline:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback} = React;

/* ---------- tiny inline icon set ---------- */
const P = {
  play:"M8 5v14l11-7z", refresh:"M21 12a9 9 0 1 1-2.64-6.36M21 4v5h-5",
  stop:"M6 6h12v12H6z", upload:"M12 16V4M7 9l5-5 5 5M5 20h14",
  check:"M20 6 9 17l-5-5", bell:"M6 8a6 6 0 1 1 12 0c0 7 3 9 3 9H3s3-2 3-9M10.3 21a2 2 0 0 0 3.4 0",
  alert:"M12 9v4m0 4h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z",
  plug:"M9 2v6M15 2v6M7 8h10v3a5 5 0 0 1-10 0V8ZM12 16v6",
  search:"M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16ZM21 21l-4.3-4.3",
  gear:"M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H1a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 2.6 7a1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H7a1.6 1.6 0 0 0 1-1.5V1a2 2 0 1 1 4 0v.1A1.6 1.6 0 0 0 17 2.6a1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V7a1.6 1.6 0 0 0 1.5 1H23a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1Z",
  plus:"M12 5v14M5 12h14", x:"M18 6 6 18M6 6l12 12",
  up:"M12 19V5M5 12l7-7 7 7", down:"M12 5v14M5 12l7 7 7-7",
  cloud:"M12 13v8m-4-4 4 4 4-4M20 16.6A5 5 0 0 0 18 7h-1.3A8 8 0 1 0 4 15.2",
  dl:"M12 3v12m-5-5 5 5 5-5M5 21h14", zap:"M13 2 3 14h7l-1 8 10-12h-7l1-8Z",
  filter:"M22 3H2l8 9.5V19l4 2v-8.5L22 3Z", mail:"M4 5h16v14H4zM4 7l8 6 8-6",
  home:"M3 11l9-8 9 8M5 10v10h14V10", chart:"M3 3v18h18M8 16v-5M13 16V8M18 16v-9",
};
const Icon=({n,s=16,c="currentColor",sw=2,cls=""})=>(
  <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={sw}
    strokeLinecap="round" strokeLinejoin="round" className={cls}>
    {(P[n]||"").split("M").filter(Boolean).map((d,i)=><path key={i} d={"M"+d}/>)}
  </svg>);

/* ---------- helpers ---------- */
const fmt=n=>(n==null||n==="")?"—":Number(n).toLocaleString(undefined,{maximumFractionDigits:2});
const fmtInt=n=>(n==null)?"0":Number(n).toLocaleString();
const trunc=(u,n=42)=>{if(!u)return"—";let l=u.replace(/^https?:\/\//,"");return l.length>n?l.slice(0,n-1)+"…":l};
const elapsed=s=>`${String(Math.floor(s/60)).padStart(2,"0")}m ${String(s%60).padStart(2,"0")}s`;
async function api(path,opts){const r=await fetch(path,opts);try{return await r.json()}catch(e){return{}}}
async function apiJSON(path,body){return api(path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body||{})})}
const COL={emerald:"#10b981",amber:"#f59e0b",red:"#ef4444",blue:"#2563eb",mut:"#71717a"};
const hexA=(h,a)=>{const n=parseInt(h.slice(1),16);return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`};

/* ---------- Toasts (context-free, simple bus) ---------- */
let _toastFn=()=>{};
const toast=(text,kind="ok")=>_toastFn(text,kind);
function Toaster(){
  const [items,setItems]=useState([]);
  _toastFn=(text,kind)=>{const id=Math.random();setItems(x=>[...x,{id,text,kind}]);
    setTimeout(()=>setItems(x=>x.filter(i=>i.id!==id)),3000)};
  return <div className="fixed top-4 right-4 z-50 flex flex-col gap-2">
    {items.map(t=><div key={t.id} className="toastin px-4 py-2.5 rounded-lg text-[13px] border shadow-2xl max-w-sm"
      style={{background:"var(--panel2)",borderColor:t.kind==="err"?"var(--red)":t.kind==="ok"?"var(--emerald)":"var(--border)"}}>
      {t.text}</div>)}
  </div>;
}

/* ---------- shared bits ---------- */
const Badge=({children,color})=>(
  <span className="ml-auto text-[10.5px] font-bold px-2 py-0.5 rounded-full"
    style={{background:hexA(color,.16),color}}>{children}</span>);
const Pill=({children,color})=>(
  <span className="text-[10px] font-bold uppercase tracking-wide px-2 py-0.5 rounded"
    style={{background:hexA(color,.14),color}}>{children}</span>);
const Stat=({k,v,color})=>(
  <div className="rounded-xl border px-3.5 py-3" style={{background:"var(--panel)",borderColor:"var(--border)"}}>
    <div className="text-[10px] tracking-wider mb-1.5" style={{color:"var(--mut)"}}>{k}</div>
    <div className="text-2xl font-bold font-mono" style={{color:color||"#fff"}}>{v}</div>
  </div>);
const Btn=({children,kind="ghost",onClick,disabled,title,sm})=>{
  const base="inline-flex items-center gap-1.5 font-semibold rounded-lg border transition disabled:opacity-40 disabled:cursor-not-allowed";
  const pad=sm?"px-2.5 py-1.5 text-[11.5px]":"px-3.5 py-2 text-[12.5px]";
  const styles={blue:{background:"var(--blue)",borderColor:"var(--blue)",color:"#fff"},
    emerald:{background:"var(--emerald)",borderColor:"var(--emerald)",color:"#04140d"},
    amber:{background:"var(--amber)",borderColor:"var(--amber)",color:"#1a1203"},
    red:{background:"transparent",borderColor:"var(--red)",color:"var(--red)"},
    ghost:{background:"var(--panel2)",borderColor:"var(--border)",color:"#d4d4d8"}}[kind];
  return <button title={title} onClick={onClick} disabled={disabled} className={base+" "+pad} style={styles}>{children}</button>;
};
function Toggle({on,onChange}){
  return <button onClick={()=>onChange(!on)} className="relative w-10 h-[22px] rounded-full transition"
    style={{background:on?"var(--emerald)":"var(--panel2)",border:"1px solid "+(on?"var(--emerald)":"var(--border)")}}>
    <span className="absolute top-[2px] w-[16px] h-[16px] rounded-full transition-all"
      style={{left:on?"20px":"2px",background:on?"#04140d":"var(--mut)"}}/></button>;
}

/* Excel-style multi-select filter (filter a column by its cell values) */
function ExcelFilter({label,options,selected,onChange}){
  const [open,setOpen]=useState(false);const [q,setQ]=useState("");const ref=useRef(null);
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h)},[]);
  const sel=new Set(selected);
  const filtered=options.filter(o=>o.value.toLowerCase().includes(q.toLowerCase()));
  const toggle=v=>{const n=new Set(sel);n.has(v)?n.delete(v):n.add(v);onChange([...n])};
  const active=selected.length>0;
  return <div className="relative" ref={ref}>
    <button onClick={()=>setOpen(o=>!o)} className="inline-flex items-center gap-1.5 rounded-lg px-2.5 py-1.5 text-[12px] font-semibold border"
      style={{background:active?hexA(COL.blue,.16):"var(--panel2)",borderColor:active?COL.blue:"var(--border)",color:active?"#fff":"#d4d4d8"}}>
      <Icon n="filter" s={13}/>{label}{active?` · ${selected.length}`:""}<span style={{color:"var(--mut)"}}>▾</span></button>
    {open&&<div className="absolute right-0 z-40 mt-1 w-72 rounded-lg border shadow-2xl p-2 fadeup"
      style={{background:"var(--panel2)",borderColor:"var(--border)"}}>
      <div className="flex items-center gap-1.5 mb-1.5 rounded px-2 py-1.5" style={{background:"var(--panel)",border:"1px solid var(--border)"}}>
        <Icon n="search" s={13} c="var(--mut)"/><input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Search vendor…"
          className="bg-transparent text-[12px] w-full" style={{color:"#e4e4e7"}}/></div>
      <div className="flex justify-between text-[10.5px] mb-1 px-0.5">
        <a className="cursor-pointer font-semibold" style={{color:COL.blue}} onClick={()=>onChange(filtered.map(o=>o.value))}>SELECT ALL</a>
        <a className="cursor-pointer" style={{color:"var(--mut)"}} onClick={()=>onChange([])}>CLEAR</a></div>
      <div className="max-h-64 overflow-y-auto pr-0.5">
        {filtered.map(o=><label key={o.value} className="flex items-center gap-2 text-[12px] px-1.5 py-1 rounded hover:bg-white/5 cursor-pointer">
          <input type="checkbox" checked={sel.has(o.value)} onChange={()=>toggle(o.value)}/>
          <span className="flex-1 truncate font-mono">{o.value}</span>
          <span className="text-[10.5px]" style={{color:"var(--mut)"}}>{o.count}</span></label>)}
        {!filtered.length&&<div className="text-center py-3 text-[11px]" style={{color:"var(--mut)"}}>no vendors match</div>}
      </div>
      <div className="text-[10px] mt-1.5 px-0.5" style={{color:"var(--mut)"}}>
        {active?`Showing ${selected.length} vendor(s)`:"Showing all vendors"}</div>
    </div>}
  </div>;
}

/* ===================== HOME (insights) ===================== */
function ChartBox({type,labels,datasets,options,h=250}){
  const ref=useRef(null);const inst=useRef(null);
  useEffect(()=>{
    if(!window.Chart||!ref.current)return;
    if(inst.current){inst.current.destroy();inst.current=null;}
    const grid="#27272a",tick="#a1a1aa";
    inst.current=new window.Chart(ref.current.getContext("2d"),{type,data:{labels,datasets},
      options:Object.assign({responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:tick,font:{size:11},boxWidth:12}}},
        scales:(type==="doughnut"||type==="pie")?{}:{
          x:{ticks:{color:tick,font:{size:10}},grid:{color:grid}},
          y:{ticks:{color:tick,font:{size:10}},grid:{color:grid}}}},options||{})});
    return ()=>{if(inst.current){inst.current.destroy();inst.current=null;}};
  });
  return <div style={{height:h}}><canvas ref={ref}/></div>;
}
const Panel=({title,children,sub})=>(
  <div className="rounded-xl border p-4" style={{background:"var(--panel)",borderColor:"var(--border)"}}>
    <div className="flex items-baseline justify-between mb-3">
      <h3 className="text-[12px] font-bold tracking-wide">{title}</h3>
      {sub&&<span className="text-[10.5px]" style={{color:"var(--mut)"}}>{sub}</span>}</div>
    {children}</div>);

function Home({go}){
  const [d,setD]=useState(null);
  useEffect(()=>{api("/api/insights").then(setD)},[]);
  if(!d) return <div className="text-center py-20" style={{color:"var(--mut)"}}>Loading insights…</div>;
  const c=d.counts||{}, ex=d.exposure||{}, fxr=d.fx||{};
  const kpis=[
    ["TOTAL PRODUCTS",fmtInt(c.total),"#fff"],
    ["MATCHED",fmtInt(c.matched),COL.emerald],
    ["MISMATCHES",fmtInt(c.mismatch),COL.amber],
    ["ERRORS",fmtInt(c.error),COL.red],
    ["VENDORS",fmtInt(d.vendors),COL.blue],
    ["AWAITING APPROVAL",fmtInt(c.awaiting),COL.amber],
    ["APPROVED",fmtInt(c.approved),COL.emerald],
    ["OVERPRICED EXPOSURE",`₹${fmtInt(Math.round(ex.over||0))}`,COL.red],
  ];
  const matchRate=c.total?Math.round((c.matched/c.total)*100):0;
  return <div className="h-full overflow-auto pr-1">
    <div className="grid grid-cols-4 gap-3 mb-4">
      {kpis.map(([k,v,col])=><Stat key={k} k={k} v={v} color={col}/>)}
    </div>
    <div className="grid grid-cols-3 gap-3 mb-4">
      <Panel title="Catalog status" sub={`${matchRate}% matched`}>
        <ChartBox type="doughnut" h={230}
          labels={["Matched","Mismatch","Error","Pending"]}
          datasets={[{data:[c.matched||0,c.mismatch||0,c.error||0,c.pending||0],
            backgroundColor:[COL.emerald,COL.amber,COL.red,"#3f3f46"],borderWidth:0}]}
          options={{plugins:{legend:{position:"bottom"}},cutout:"62%"}}/>
      </Panel>
      <Panel title="Top vendors by mismatch" sub="needs review">
        <ChartBox type="bar" h={230}
          labels={d.top_mismatch.map(v=>v.brand.replace(/\.(com|in|co|net).*$/,""))}
          datasets={[{label:"mismatches",data:d.top_mismatch.map(v=>v.count),
            backgroundColor:COL.amber,borderRadius:4}]}
          options={{indexAxis:"y",plugins:{legend:{display:false}}}}/>
      </Panel>
      <Panel title="Largest vendors" sub="by product count">
        <ChartBox type="bar" h={230}
          labels={d.top_products.map(v=>v.brand.replace(/\.(com|in|co|net).*$/,""))}
          datasets={[{label:"products",data:d.top_products.map(v=>v.count),
            backgroundColor:COL.blue,borderRadius:4}]}
          options={{indexAxis:"y",plugins:{legend:{display:false}}}}/>
      </Panel>
    </div>
    <div className="grid grid-cols-3 gap-3">
      <Panel title="Exposure (mismatch gap)">
        <div className="space-y-3 py-1">
          <div className="flex justify-between"><span className="text-[12px]" style={{color:"var(--mut)"}}>Overpriced (site &gt; base)</span>
            <b className="font-mono" style={{color:COL.red}}>₹{fmtInt(Math.round(ex.over||0))}</b></div>
          <div className="flex justify-between"><span className="text-[12px]" style={{color:"var(--mut)"}}>Underpriced (site &lt; base)</span>
            <b className="font-mono" style={{color:COL.emerald}}>₹{fmtInt(Math.round(ex.under||0))}</b></div>
          <div className="flex justify-between"><span className="text-[12px]" style={{color:"var(--mut)"}}>Avg gap / mismatch</span>
            <b className="font-mono">₹{fmtInt(Math.round(ex.avg||0))}</b></div>
          <div className="flex justify-between border-t pt-2" style={{borderColor:"var(--border)"}}><span className="text-[12px]" style={{color:"var(--mut)"}}>Approved value</span>
            <b className="font-mono" style={{color:COL.emerald}}>₹{fmtInt(Math.round(d.approved_value||0))}</b></div>
        </div>
      </Panel>
      <Panel title="Live FX rates" sub="to INR">
        <div className="space-y-3 py-1">
          {["USD","CAD"].map(cur=><div key={cur} className="flex justify-between items-center">
            <span className="text-[13px] font-semibold">{cur}</span>
            <b className="font-mono text-[15px]" style={{color:COL.blue}}>₹{fmt(fxr[cur])}</b></div>)}
          <div className="text-[10.5px] pt-2 border-t" style={{borderColor:"var(--border)",color:"var(--mut)"}}>Used for conversion in matching &amp; approval.</div>
        </div>
      </Panel>
      <Panel title="Quick actions">
        <div className="flex flex-col gap-2 py-1">
          <Btn kind="blue" onClick={()=>go("pipeline")}><Icon n="play" s={14}/>Run the pipeline</Btn>
          <Btn kind="amber" onClick={()=>go("review")}><Icon n="check" s={14}/>Review {fmtInt(c.awaiting)} awaiting</Btn>
          <Btn kind="ghost" onClick={()=>go("alerts")}><Icon n="bell" s={14}/>View alerts</Btn>
          <Btn kind="emerald" onClick={()=>window.location="/api/export?kind=all&fmt=xlsx"}><Icon n="dl" s={14}/>Export full catalog</Btn>
        </div>
      </Panel>
    </div>
  </div>;
}

/* ===================== PIPELINE ===================== */
function Pipeline({onMeta}){
  const [st,setSt]=useState({running:false,phase:"idle",total_rows:0,current_row:0,matched:0,mismatch:0,errors:0,elapsed:0,message:"Idle.",entries:[],log_total:0});
  const [cfg,setCfg]=useState({concurrency:16,timeout_ms:12000,batch_size:500,rest_between:60,safe_retry:true,simulation:false});
  const [adv,setAdv]=useState(false);
  const [cat,setCat]=useState({total:0,pending:0});
  const [vendors,setVendors]=useState([]);
  const [vsel,setVsel]=useState([]);          // vendor scope for the run
  const cursor=useRef(0); const logRef=useRef(null);
  useEffect(()=>{api("/api/meta").then(d=>{if(d.counts)setCat(d.counts)});
    api("/api/vendors").then(d=>setVendors(d.vendors||[]))},[]);
  const scopeCount=vsel.length?vendors.filter(v=>vsel.includes(v.vendor)).reduce((a,v)=>a+v.count,0):(cat.total||0);

  const poll=useCallback(async()=>{
    const d=await api("/api/pipe/status?cursor="+cursor.current);
    if(!d||d.running===undefined)return;
    cursor.current=d.cursor;
    setSt(s=>({...d,entries:[...s.entries,...(d.entries||[])].slice(-400)}));
  },[]);
  useEffect(()=>{let live=true;const loop=async()=>{if(!live)return;await poll();
    setTimeout(loop, (st.running)?800:1800)};loop();return()=>{live=false}},[poll,st.running]);
  useEffect(()=>{if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight},[st.entries.length]);

  const sendCfg=async(extra)=>apiJSON("/api/pipe/config",{...cfg,...extra});
  const run=async(mode)=>{await sendCfg({fresh_start:mode==="fresh",retry_errors:mode==="update",vendors:vsel});
    const d=await apiJSON("/api/pipe/start",{});
    d.error?toast(d.error,"err"):toast(mode==="fresh"?"Run started — checking every product":"Checking updates…","ok");
    setSt(s=>({...s,entries:[]}));cursor.current=0;};
  const abort=async()=>{await apiJSON("/api/pipe/abort",{});toast("Aborting…")};

  const pct=st.total_rows?Math.min(100,st.current_row/st.total_rows*100):0;
  const phaseTxt={main:"Extracting live pricing…",safe_retry:"Safe-retry window — gently re-fetching errors",done:"Run complete — saved to database"}[st.phase];
  const statusColor=e=>e.status==="Price Matched"?"var(--emerald)":e.status&&e.status.startsWith("Price Mismatch")?"var(--amber)":"var(--red)";

  return <div className="grid grid-cols-[320px_1fr] gap-5 h-full min-h-0">
    {/* config */}
    <div className="overflow-y-auto pr-1 space-y-3">
      <div className="rounded-xl border p-3" style={{background:"var(--panel)",borderColor:"var(--border)"}}>
        <div className="text-[10px] tracking-wider mb-2" style={{color:"var(--mut)"}}>PRODUCT CATALOG</div>
        <div className="flex items-baseline gap-2">
          <span className="text-2xl font-bold font-mono">{fmtInt(cat.total)}</span>
          <span className="text-[11px]" style={{color:"var(--mut)"}}>products in database</span></div>
        <div className="text-[11px] mt-1" style={{color:"var(--mut)"}}>{fmtInt(cat.pending)} pending · permanent</div>
        <div className="text-[10.5px] mt-2 leading-relaxed" style={{color:"var(--mut)"}}>
          <span style={{color:"var(--emerald)"}}>●</span> The catalog is permanent — no upload needed. Just configure and run.</div>
      </div>

      <div className="rounded-xl border p-3 space-y-2" style={{background:"var(--panel)",borderColor:"var(--border)"}}>
        <div className="text-[10px] tracking-wider" style={{color:"var(--mut)"}}>ENGINE SETTINGS</div>
        <div className="grid grid-cols-2 gap-2">
          {[["Concurrency","concurrency"],["Timeout (ms)","timeout_ms"],["Batch Size","batch_size"],["Rest (s)","rest_between"]].map(([lbl,k])=>
            <div key={k}><div className="text-[10px] mb-1" style={{color:"var(--mut)"}}>{lbl}</div>
              <input type="number" value={cfg[k]} onChange={e=>setCfg({...cfg,[k]:+e.target.value})}
                className="w-full rounded-md px-2 py-1.5 text-[12.5px] font-mono"
                style={{background:"var(--panel2)",border:"1px solid var(--border)",color:"#e4e4e7"}}/></div>)}
        </div>
        <div className="flex items-center justify-between pt-1">
          <div><div className="text-[12.5px]">Safe-Retry Window</div>
            <div className="text-[10px]" style={{color:"var(--mut)"}}>Gently re-fetch errors after the run (no 429s)</div></div>

      {phaseTxt&&st.phase!=="idle"&&<div className="flex items-center gap-2 mb-3 px-3.5 py-2 rounded-lg border text-[12.5px] font-semibold"
        style={{borderColor:hexA(COL.amber,.3),background:hexA(COL.amber,.1),color:"var(--amber)"}}>
        <Icon n="alert" s={14}/>Current Phase: {phaseTxt}</div>}

            <th key={h} className="text-left font-semibold px-3 py-2 text-[10px] tracking-wider border-b" style={{borderColor:"var(--border)"}}>{h}</th>)}</tr></thead>

            <td className="px-3 py-1.5 font-mono"><a href={e.url} target="_blank" style={{color:"var(--blue)"}}>{trunc(e.url)}</a></td>

          </tbody></table>

    </div>
  </div>;
}

/* ===================== REVIEW ===================== */
function Review({onMeta}){
  const [tab,setTab]=useState("mismatch");
  const [vendors,setVendors]=useState([]);
  const [vsel,setVsel]=useState([]);          // selected vendors (Excel filter)
  const [items,setItems]=useState([]);
  const [counts,setCounts]=useState({});
  const [busy,setBusy]=useState(false);
  const [gMarkup,setGMarkup]=useState(0);     // ONE global markup for all
  const [gConvert,setGConvert]=useState(true);// ONE global FX convert for all
  const [fxr,setFxr]=useState({USD:0,CAD:0,INR:1});
  const load=useCallback(async()=>{setBusy(true);
    const d=await api(`/api/review/items?kind=${tab}&brands=${encodeURIComponent(vsel.join(","))}`);
    setItems(d.items||[]);setCounts(d.counts||{});setBusy(false);onMeta&&onMeta();},[tab,vsel]);
  useEffect(()=>{load()},[load]);
  useEffect(()=>{api(`/api/vendors?kind=${tab}`).then(d=>setVendors(d.vendors||[]))},[tab]);
  useEffect(()=>{api("/api/fx").then(d=>d.rates&&setFxr(d.rates))},[]);

  // convert the raw live price to INR at the CURRENT rate (robust for old rows)
  const liveInr=it=>{if(it.live_price==null)return null;const c=(it.currency||"INR").toUpperCase();
    const r=(c==="INR"||c==="UNKNOWN")?1:(fxr[c]||1);return it.live_price*r;};
  const dInr=it=>{const li=liveInr(it);return (li!=null&&it.base_price!=null)?li-it.base_price:null;};
  const projFinal=it=>{const r=gConvert?liveInr(it):it.live_price;return r==null?null:r*(1+(+gMarkup||0)/100)};
  const decide=async(it,decision)=>{const r=await apiJSON("/api/review/decide",
    {row:it.id,decision,ref:"live",markup_pct:gMarkup,convert:gConvert});
    if(r.ok){toast(decision==="approved"?`Approved → ₹${fmt(r.final_price)}`:"Rejected","ok");load()}else toast(r.error||"Failed","err")};
  const approveAll=async()=>{
    if(!confirm(`Approve ALL ${items.length} ${tab} item(s) with +${gMarkup}% markup${gConvert?" and USD/CAD→INR conversion":""}? (Nothing is pushed to any store — approval only.)`))return;
    const r=await apiJSON("/api/review/approve_all",{markup_pct:gMarkup,convert:gConvert,ref:"live",kind:tab,brands:vsel});
    r.ok?toast(`Approved ${r.approved} item(s) at +${r.markup}%`,"ok"):toast(r.error||"Failed","err");load();};
  const push=async(it)=>{toast("Pushing to store…");const r=await apiJSON("/api/review/push",{row:it.id});toast(r.status||"done",r.ok?"ok":"err");load()};
  const rerun=async()=>{const r=await apiJSON("/api/review/rerun",{});r.ok?toast(`Re-running ${r.total} errors…`):toast(r.error,"err")};
  const emailMismatch=async()=>{const to=prompt("Recipient email (leave blank for the default):","");if(to===null)return;
    toast("Sending mismatch sheet…");const r=await apiJSON("/api/alerts/email_mismatch",to.trim()?{to:to.trim()}:{});
    toast(r.ok?`Emailed ${r.count} mismatches → ${r.to}`:(r.error||"Send failed"),r.ok?"ok":"err")};
  const tabs=[["mismatch","Mismatches",counts.awaiting,"var(--amber)"],["error","Errors",counts.error,"var(--red)"],["resolved","Resolved",counts.matched,"var(--emerald)"]];

  return <div className="h-full min-h-0 flex flex-col">
    <div className="grid grid-cols-6 gap-2.5 mb-4">
      <Stat k="TOTAL" v={fmtInt(counts.total)}/><Stat k="MATCHED" v={fmtInt(counts.matched)} color="var(--emerald)"/>
      <Stat k="MISMATCH" v={fmtInt(counts.mismatch)} color="var(--amber)"/><Stat k="ERRORS" v={fmtInt(counts.error)} color="var(--red)"/>
      <Stat k="APPROVED" v={fmtInt(counts.approved)} color="var(--blue)"/><Stat k="AWAITING" v={fmtInt(counts.awaiting)} color="var(--amber)"/>
    </div>

    {/* ONE global control: markup + FX conversion applied to everything */}
    <div className="flex items-center gap-3 mb-3 px-3.5 py-2.5 rounded-xl border flex-wrap"
      style={{background:"var(--panel)",borderColor:"var(--border)"}}>
      <span className="text-[11px] tracking-wider" style={{color:"var(--mut)"}}>GLOBAL PRICING</span>
      <div className="flex items-center gap-2">
        <span className="text-[12px]" style={{color:"var(--mut)"}}>Markup</span>
        <input type="number" value={gMarkup} onChange={e=>setGMarkup(e.target.value)}
          className="w-20 rounded px-2 py-1.5 text-[12.5px] font-mono text-right"
          style={{background:"var(--panel2)",border:"1px solid var(--border)",color:"#e4e4e7"}}/>
        <span className="text-[12px]" style={{color:"var(--mut)"}}>%</span>
      </div>
      <div className="flex items-center gap-2">
        <Toggle on={gConvert} onChange={setGConvert}/>
        <span className="text-[12px]">Convert USD/CAD → INR</span>
      </div>
      <span className="text-[11px] font-mono" style={{color:"var(--mut)"}}>
        FX: USD ₹{fmt(fxr.USD)} · CAD ₹{fmt(fxr.CAD)}</span>
      <div className="ml-auto flex gap-2 items-center">
        <ExcelFilter label="Vendor" selected={vsel} onChange={setVsel}
          options={vendors.map(v=>({value:v.vendor,count:v.count}))}/>
        <Btn kind="emerald" onClick={approveAll} disabled={!items.length}>
          <Icon n="check" s={13}/>Apply &amp; Approve all ({items.length})</Btn>
      </div>
    </div>

    <div className="flex gap-1.5 mb-3 items-center">
      {tabs.map(([k,lbl,n,c])=><button key={k} onClick={()=>{setTab(k);setVsel([])}} className="px-4 py-2 rounded-t-lg text-[13px] font-semibold border-b-2 navi"
        style={{background:tab===k?"var(--panel2)":"transparent",borderColor:tab===k?c:"transparent",color:tab===k?"#fff":"var(--mut)"}}>
        {lbl} <span className="font-mono text-[11px]" style={{color:c}}>{fmtInt(n)}</span></button>)}
      <div className="ml-auto flex gap-2 items-center">
        {tab==="error"&&<Btn kind="ghost" sm onClick={rerun}><Icon n="refresh" s={12}/>Re-run errors</Btn>}
        {tab==="mismatch"&&<Btn kind="amber" sm onClick={emailMismatch}><Icon n="mail" s={12}/>Email sheet</Btn>}
        <Btn kind="emerald" sm onClick={()=>window.location=`/api/export?kind=${tab==="resolved"?"all":tab}&fmt=xlsx`}><Icon n="dl" s={12}/>Export</Btn>
      </div>
    </div>
    <div className="flex-1 min-h-0 overflow-auto rounded-xl border" style={{background:"var(--panel)",borderColor:"var(--border)"}}>
      <table className="w-full text-[12px]"><thead className="sticky top-0" style={{background:"var(--panel)"}}>
        <tr style={{color:"var(--mut)"}}>{["PRODUCT","VENDOR","BASE ₹","LIVE (site)","≈ ₹ LIVE","Δ ₹","FINAL ₹","ACTIONS"].map(h=>
          <th key={h} className="text-left font-semibold px-3 py-2 text-[10px] tracking-wider border-b whitespace-nowrap" style={{borderColor:"var(--border)"}}>{h}</th>)}</tr></thead>
        <tbody>{items.map(it=>{const li=liveInr(it);const dl=dInr(it);const up=(dl||0)>0;const pf=it.final_price!=null?it.final_price:projFinal(it);return <tr key={it.id} className="border-b" style={{borderColor:"var(--border)"}}>
          <td className="px-3 py-2 font-mono"><a href={it.url} target="_blank" style={{color:"var(--blue)"}}>{trunc(it.url,34)}</a></td>
          <td className="px-3 py-2 font-mono text-[11px]">{it.brand}</td>
          <td className="px-3 py-2 font-mono text-right">{fmt(it.base_price)}</td>
          <td className="px-3 py-2 font-mono text-right">{fmt(it.live_price)} <span style={{color:"var(--mut)"}}>{it.currency}</span></td>
          <td className="px-3 py-2 font-mono text-right">{fmt(li)}</td>
          <td className="px-3 py-2 font-mono text-right" style={{color:up?"var(--red)":"var(--emerald)"}}>{dl!=null?(up?"+":"")+fmt(dl):"—"}</td>
          <td className="px-3 py-2 font-mono text-right font-bold" style={{color:it.final_price!=null?"var(--emerald)":"var(--mut)"}}>{pf!=null?fmt(pf):"—"}</td>
          <td className="px-3 py-2"><div className="flex gap-1.5 items-center">
            {it.decision==="approved"?<Pill color={COL.emerald}>approved</Pill>:it.decision==="rejected"?<Pill color={COL.red}>rejected</Pill>:
              <><Btn kind="emerald" sm onClick={()=>decide(it,"approved")} title="Approve at global markup"><Icon n="check" s={11}/></Btn>
                <Btn kind="red" sm onClick={()=>decide(it,"rejected")}><Icon n="x" s={11}/></Btn></>}
            <Btn kind="blue" sm onClick={()=>push(it)} disabled={it.decision!=="approved"} title="Push to Store"><Icon n="cloud" s={12}/></Btn>
          </div></td></tr>})}
        {!items.length&&<tr><td colSpan="8" className="text-center py-12" style={{color:"var(--mut)"}}>{busy?"Loading…":"Nothing here."}</td></tr>}
        </tbody></table>
    </div>
  </div>;
}

          <td className="px-3 py-2.5"><input type="password" placeholder={r.has_token?"••••••••":"shpat_…"} onChange={e=>set(r.brand,"_token",e.target.value)}
            className="w-36 rounded px-2 py-1 text-[11.5px] font-mono" style={{background:"var(--panel2)",border:"1px solid var(--border)",color:"#e4e4e7"}}/></td>
          <td className="px-3 py-2.5"><input defaultValue={r.api_version} onChange={e=>set(r.brand,"api_version",e.target.value)}
            className="w-20 rounded px-2 py-1 text-[11.5px] font-mono" style={{background:"var(--panel2)",border:"1px solid var(--border)",color:"#e4e4e7"}}/></td>
          <td className="px-3 py-2.5"><div className="flex items-center gap-2"><Toggle on={!r.dry_run} onChange={v=>set(r.brand,"dry_run",!v)}/>
            <span className="text-[10.5px]" style={{color:r.dry_run?"var(--amber)":"var(--emerald)"}}>{r.dry_run?"Dry Run":"Live"}</span></div></td>
          <td className="px-3 py-2.5"><div className="flex gap-1.5">

}

function App(){
  const [view,setView]=useState("home");
  const [meta,setMeta]=useState({counts:{},alerts:0});
  const [run,setRun]=useState({running:false,phase:"idle"});
  const loadMeta=useCallback(async()=>{const d=await api("/api/meta");if(d.counts)setMeta(d)},[]);
  useEffect(()=>{loadMeta();const t=setInterval(loadMeta,6000);return()=>clearInterval(t)},[loadMeta]);
  useEffect(()=>{const t=setInterval(async()=>{const d=await api("/api/pipe/status?cursor=999999999");if(d.running!==undefined)setRun(d)},4000);return()=>clearInterval(t)},[]);
  const nav=[["home","Home","home",null],["pipeline","Pipeline","play",null],
    ["review","Review & Approve","check",meta.counts.awaiting],
    ["alerts","Alerts","bell",meta.alerts],["integrations","Integrations","plug",null]];
  const titles={home:"Insights",pipeline:"Pipeline",review:"Review & Approve",alerts:"Alerts",integrations:"Integrations"};
  const runPill=run.running?`Run: ${run.phase==="safe_retry"?"Safe-retry…":"Processing…"}`:"Idle";

  return <div className="flex h-screen" style={{background:"var(--bg)"}}>
    <Toaster/>
    {/* rail */}
    <nav className="w-[220px] shrink-0 flex flex-col p-3 border-r" style={{background:"var(--panel)",borderColor:"var(--border)"}}>
      <div className="flex items-center gap-2.5 px-2 py-2 mb-4">
        <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:"linear-gradient(135deg,var(--blue),var(--emerald))"}}><Icon n="zap" s={17} c="#fff"/></div>
        <div><div className="font-extrabold tracking-tight">PriceSync</div><div className="text-[10px]" style={{color:"var(--mut)"}}>v2.4.0</div></div>
      </div>
      {nav.map(([k,lbl,ic,n])=><button key={k} onClick={()=>setView(k)} className="navi flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-[13px] font-semibold mb-1 relative"
        style={{background:view===k?hexA(COL.emerald,.12):"transparent",color:view===k?"#fff":"var(--mut)",
          borderLeft:"2px solid "+(view===k?"var(--emerald)":"transparent")}}>
        <Icon n={ic} s={16}/><span>{lbl}</span>
        {n>0&&<Badge color={k==="alerts"?COL.red:COL.amber}>{n}</Badge>}</button>)}
      <button className="navi flex items-center gap-2 px-3 py-2.5 rounded-lg text-[13px] font-semibold mt-2 justify-center" style={{background:"var(--blue)",color:"#fff"}}
        onClick={()=>{setView("pipeline");toast("Drop a sheet in the Pipeline panel to add products")}}><Icon n="plus" s={15}/>New Import</button>
      <div className="mt-auto pt-3 border-t flex items-center justify-between" style={{borderColor:"var(--border)"}}>
        <div className="flex items-center gap-2 text-[11px]" style={{color:"var(--mut)"}}>
          <span className="w-2 h-2 rounded-full pdot" style={{background:"var(--emerald)"}}/>DB: Connected</div>
        <button style={{color:"var(--mut)"}}><Icon n="gear" s={15}/></button></div>
    </nav>
    {/* main */}
    <div className="flex-1 flex flex-col min-w-0">
      <div className="flex items-center justify-between px-5 py-3 border-b" style={{background:"var(--panel)",borderColor:"var(--border)"}}>
        <div className="flex items-center gap-3">
          <h1 className="text-[15px] font-bold">{titles[view]}</h1>
          <span className="px-2.5 py-1 rounded-full text-[11px] font-semibold" style={{background:run.running?hexA(COL.amber,.12):"var(--panel2)",color:run.running?"var(--amber)":"var(--mut)"}}>{runPill}</span>
        </div>
        <div className="flex items-center gap-3">
          <div className="flex items-center gap-2 px-3 py-1.5 rounded-lg" style={{background:"var(--panel2)",border:"1px solid var(--border)"}}>
            <Icon n="search" s={14} c="var(--mut)"/><input placeholder="Search logs…" className="bg-transparent text-[12px] w-36" style={{color:"#e4e4e7"}}/></div>
          <button style={{color:"var(--mut)"}}><Icon n="bell" s={17}/></button>
          <div className="w-8 h-8 rounded-full flex items-center justify-center text-[12px] font-bold" style={{background:"var(--blue)",color:"#fff"}}>PS</div>
        </div>
      </div>
      <div className="flex-1 min-h-0 p-5">
        {view==="home"&&<Home go={setView}/>}
        {view==="pipeline"&&<Pipeline onMeta={loadMeta}/>}
        {view==="review"&&<Review onMeta={loadMeta}/>}
        {view==="alerts"&&<Alerts/>}
        {view==="integrations"&&<Integrations/>}
      </div>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
