<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MBO Tracker · Terminal v2.4</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e0e10; --surface:#131315; --c-low:#1c1b1d; --c:#201f22; --c-high:#2a2a2c; --c-highest:#353437;
    --on:#e5e1e4; --on-var:#c2c6d6; --outline:#8c909f; --ov:#424754;
    --primary:#3b82f6; --primary2:#4d8eff; --secondary:#4ae176; --tertiary:#ffb95f; --error:#ff6b6b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--on);font-family:Geist,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .mono{font-family:"JetBrains Mono",monospace}
  .lbl{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--outline)}
  *{scrollbar-width:thin;scrollbar-color:#3a3a3d transparent}
  *::-webkit-scrollbar{width:8px;height:8px}*::-webkit-scrollbar-thumb{background:#3a3a3d;border-radius:8px}
  input,select,button{outline:none;font-family:inherit}
  .card{background:var(--surface);border:1px solid var(--ov);border-radius:10px}
  .tile{background:var(--c-low);border:1px solid var(--ov);border-radius:10px}
  .inp{background:var(--c-low);border:1px solid var(--ov);color:var(--on);border-radius:6px;padding:8px 10px;font-size:13px;width:100%}
  .inp:focus{border-color:var(--primary)}
  .navi{transition:background .15s,color .15s,border-color .15s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
  .fadeup{animation:fadeUp .22s ease both}
  @keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
  .shine::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:shimmer 1.6s infinite}
  @keyframes pdot{0%{box-shadow:0 0 0 0 rgba(74,225,118,.5)}70%{box-shadow:0 0 0 6px rgba(74,225,118,0)}100%{box-shadow:0 0 0 0 rgba(74,225,118,0)}}
  .pdot{animation:pdot 2s infinite}
  @keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
  .toastin{animation:slideIn .3s cubic-bezier(.22,1.2,.36,1) both}
  .acc{overflow:hidden;transition:max-height .3s ease}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback}=React;

/* ---------- icons ---------- */
const P={
  pipeline:"M3 12h4l2 7 4-14 2 7h6", review:"M8 4h8v3H8zM6 5H5v16h14V5h-1M8.5 13.5l2 2 4.5-4.5",
  alerts:"M6 8a6 6 0 1 1 12 0c0 7 3 9 3 9H3s3-2 3-9M10.5 21a2 2 0 0 0 3 0",
  integrations:"M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6",
  settings:"M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H1a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 2.6 7a1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H7a1.6 1.6 0 0 0 1-1.5V1a2 2 0 1 1 4 0v.1A1.6 1.6 0 0 0 17 2.6a1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V7a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1Z",
  support:"M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18M9.1 9a3 3 0 0 1 5.8 1c0 2-3 2.5-3 2.5M12 17h.01",
  search:"M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16M21 21l-4.3-4.3",
  share:"M6 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6M18 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6M18 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6M8.6 10.5l6.8-4M8.6 13.5l6.8 4",
  card:"M3 6h18v12H3zM3 10h18", play:"M8 5v14l11-7z", refresh:"M21 12a9 9 0 1 1-2.6-6.4M21 4v5h-5",
  stop:"M6 6h12v12H6z", upload:"M12 16V4M7 9l5-5 5 5M5 20h14", dl:"M12 3v12m-5-5 5 5 5-5M5 21h14",
  trash:"M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13", check:"M20 6 9 17l-5-5", x:"M18 6 6 18M6 6l12 12",
  flag:"M4 21V4h13l-2 4 2 4H6", up:"M12 19V5M6 11l6-6 6 6", down:"M12 5v14M6 13l6 6 6-6",
  plus:"M12 5v14M5 12h14", bolt:"M13 2 3 14h7l-1 8 10-12h-7l1-8Z", clock:"M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18M12 7v5l3 2",
  users:"M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8M22 21v-2a4 4 0 0 0-3-3.9M16 3.1a4 4 0 0 1 0 7.8",
  logout:"M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9",
};
const Icon=({n,s=16,c="currentColor",sw=1.8})=>(
  <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
    {(P[n]||"").split("M").filter(Boolean).map((d,i)=><path key={i} d={"M"+d}/>)}</svg>);

/* ---------- helpers ---------- */
const fmt=n=>(n==null||n==="")?"—":Number(n).toLocaleString(undefined,{maximumFractionDigits:2});
const fmtInt=n=>(n==null)?"0":Number(n).toLocaleString();
const inr=n=>(n==null)?"—":"₹"+Number(n).toLocaleString(undefined,{maximumFractionDigits:2});
const trunc=(u,n=40)=>{if(!u)return"—";let l=u.replace(/^https?:\/\//,"");return l.length>n?l.slice(0,n-1)+"…":l};
const pid=u=>{if(!u)return"—";const seg=u.split("?")[0].split("/").filter(Boolean).pop()||u;return seg.slice(0,22).toUpperCase();};
const elapsed=s=>`${String(Math.floor(s/60)).padStart(2,"0")}m ${String(s%60).padStart(2,"0")}s`;
const hhmmss=()=>new Date().toLocaleTimeString("en-GB");
const initials=b=>(b||"?").replace(/^www\./,"")[0].toUpperCase();
async function api(p,o){const r=await fetch(p,o);try{return await r.json()}catch(e){return{}}}
async function apiJSON(p,b){return api(p,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b||{})})}
const COL={primary:"#3b82f6",sec:"#4ae176",ter:"#ffb95f",err:"#ff6b6b",out:"#8c909f"};

/* ---------- toasts ---------- */
let _toast=()=>{};
const toast=(t,k)=>_toast(t,k);
function Toaster(){const[xs,setXs]=useState([]);
  _toast=(t,k)=>{const id=Math.random();setXs(a=>[...a,{id,t,k}]);setTimeout(()=>setXs(a=>a.filter(x=>x.id!==id)),3200)};
  return <div className="fixed top-4 right-4 z-50 flex flex-col gap-2">{xs.map(x=>
    <div key={x.id} className="toastin px-4 py-2.5 rounded-lg text-[13px] shadow-2xl card" style={{borderColor:x.k==="err"?COL.err:x.k==="ok"?COL.sec:"var(--ov)"}}>{x.t}</div>)}</div>;}

/* ---------- shared ---------- */
const BrandDot=({b})=><span className="inline-flex items-center justify-center mono shrink-0"
  style={{width:18,height:18,borderRadius:4,background:"var(--c-high)",color:"var(--on-var)",fontSize:9,fontWeight:600}}>{initials(b)}</span>;
const Pill=({children,c})=><span className="mono" style={{fontSize:9.5,fontWeight:600,letterSpacing:".06em",padding:"2px 7px",borderRadius:4,
  background:c+"22",color:c,border:"1px solid "+c+"55"}}>{children}</span>;
function Btn({children,kind="ghost",sm,onClick,disabled,title}){
  const pad=sm?"padding:6px 11px;font-size:11.5px":"padding:9px 15px;font-size:13px";
  const st={primary:`background:var(--primary);color:#fff;border:1px solid var(--primary)`,
    ok:`background:var(--secondary);color:#04140d;border:1px solid var(--secondary)`,
    warn:`background:var(--tertiary);color:#1a1203;border:1px solid var(--tertiary)`,
    danger:`background:#3a1414;color:var(--error);border:1px solid #5a1d1d`,
    ghost:`background:var(--c-low);color:var(--on);border:1px solid var(--ov)`}[kind];
  return <button title={title} onClick={onClick} disabled={disabled}
    className="inline-flex items-center gap-1.5 font-semibold rounded-md navi disabled:opacity-40 disabled:cursor-not-allowed"
    style={{cssText:pad+";"+st}}>{children}</button>;}
function Toggle({on,onChange}){return <button onClick={()=>onChange(!on)} className="relative navi" style={{width:42,height:23,borderRadius:20,
  background:on?"var(--secondary)":"var(--c-high)",border:"1px solid "+(on?"var(--secondary)":"var(--ov)")}}>
  <span className="absolute navi" style={{top:2,left:on?21:2,width:17,height:17,borderRadius:"50%",background:on?"#04140d":"var(--outline)"}}/></button>;}
function ChartBox({type,labels,datasets,options,h=210}){
  const ref=useRef(null),inst=useRef(null);
  useEffect(()=>{if(!window.Chart||!ref.current)return;if(inst.current){inst.current.destroy();inst.current=null;}
    inst.current=new window.Chart(ref.current.getContext("2d"),{type,data:{labels,datasets},
      options:Object.assign({responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{ticks:{color:COL.out,font:{size:9}},grid:{display:false}},y:{display:false}}},options||{})});
    return()=>{if(inst.current){inst.current.destroy();inst.current=null}};});
  return <div style={{height:h}}><canvas ref={ref}/></div>;}

/* ===================== PIPELINE ===================== */
function Pipeline({admin}){
  const [st,setSt]=useState({running:false,phase:"idle",total_rows:0,current_row:0,matched:0,mismatch:0,errors:0,elapsed:0,message:"Idle.",entries:[],log_total:0});
  const [cfg,setCfg]=useState({concurrency:8,timeout_ms:12000,batch_size:250,rest_between:2,safe_retry:true,simulation:false});
  const [vendors,setVendors]=useState([]);const [vsel,setVsel]=useState([]);
  const [rows,setRows]=useState([]);const cursor=useRef(0),logRef=useRef(null);
  useEffect(()=>{api("/api/vendors").then(d=>setVendors(d.vendors||[]))},[]);
  const poll=useCallback(async()=>{const d=await api("/api/pipe/status?cursor="+cursor.current);if(d.running===undefined)return;
    cursor.current=d.cursor;if(d.entries&&d.entries.length){const stamped=d.entries.map(e=>({...e,t:hhmmss()}));
      setRows(r=>[...r,...stamped].slice(-300));}setSt(s=>({...s,...d}));},[]);
  useEffect(()=>{let on=true;const loop=async()=>{if(!on)return;await poll();setTimeout(loop,st.running?900:2000)};loop();return()=>{on=false}},[poll,st.running]);
  useEffect(()=>{if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight},[rows.length]);
  const sendCfg=x=>apiJSON("/api/pipe/config",{...cfg,...x});
  const run=async(m)=>{if(!admin)return toast("Admin role required","err");await sendCfg({fresh_start:m==="fresh",retry_errors:m==="update",vendors:vsel});
    const d=await apiJSON("/api/pipe/start",{});d.error?toast(d.error,"err"):toast(m==="fresh"?"Run started":"Checking updates…","ok");setRows([]);cursor.current=0;};
  const abort=()=>apiJSON("/api/pipe/abort",{}).then(()=>toast("Aborting…"));
  const onFile=async(f)=>{if(!f||!admin)return;const fd=new FormData();fd.append("file",f);toast("Reading "+f.name+"…");
    const p=await api("/api/import/preview",{method:"POST",body:fd});if(!p.ok)return toast(p.error||"Preview failed","err");
    const fd2=new FormData();fd2.append("path",p.path);const d=await api("/api/import",{method:"POST",body:fd2});
    d.ok?toast(`Imported ${d.rows} products`,"ok"):toast(d.error||"Import failed","err");api("/api/vendors").then(d=>setVendors(d.vendors||[]));};
  const toggleV=v=>setVsel(s=>s.includes(v)?s.filter(x=>x!==v):[...s,v]);
  const pending=Math.max(0,(st.total_rows||0)-(st.current_row||0));
  const pct=st.total_rows?Math.min(100,st.current_row/st.total_rows*100):0;
  const tag=e=>e.status==="Fetch Error"?["FAIL",COL.err]:e.status&&e.status.startsWith("Price Mismatch")?["WARN",COL.ter]:e.status==="Price Matched"||(e.status&&e.status.startsWith("Price Matched"))?["DONE",COL.sec]:["INFO",COL.primary];
  const tiles=[["TOTAL UNITS",fmtInt(st.total_rows),"var(--on)"],["DONE",fmtInt(st.current_row),"var(--on)"],
    ["MATCHED",fmtInt(st.matched),COL.sec],["MISMATCH",fmtInt(st.mismatch),COL.ter],["ERRORS",fmtInt(st.errors),COL.err],["PENDING",fmtInt(pending),"var(--on-var)"]];
  return <div className="grid grid-cols-[300px_1fr] gap-5 h-full min-h-0">
    <div className="overflow-y-auto pr-1 space-y-5">
      <div><div className="lbl mb-2">Source Configuration</div>
        <div onClick={()=>document.getElementById("fi").click()} className="rounded-lg border-2 border-dashed flex flex-col items-center justify-center cursor-pointer"
          style={{borderColor:"var(--ov)",color:"var(--outline)",padding:"26px 10px"}}>
          <Icon n="upload" s={22}/><div className="mt-2 text-[13px]" style={{color:"var(--on-var)"}}>Drop sheet or click to upload</div>
          <div className="lbl mt-1" style={{fontSize:10}}>optional · max 50mb</div></div>
        <input id="fi" type="file" accept=".xlsx,.xls,.csv" className="hidden" onChange={e=>onFile(e.target.files[0])}/></div>
      <div><div className="lbl mb-2">Designer Domain · run scope</div>
        <div className="space-y-1.5 max-h-52 overflow-y-auto pr-1">{vendors.map(v=>{const on=vsel.includes(v.vendor);return(
          <label key={v.vendor} className="tile flex items-center gap-2.5 px-3 py-2.5 cursor-pointer navi" style={{borderColor:on?"var(--primary)":"var(--ov)"}}>
            <span className="flex items-center justify-center" style={{width:16,height:16,borderRadius:4,background:on?"var(--primary)":"transparent",border:"1px solid "+(on?"var(--primary)":"var(--outline)")}}>
              {on&&<Icon n="check" s={11} c="#fff"/>}</span>
            <input type="checkbox" className="hidden" checked={on} onChange={()=>toggleV(v.vendor)}/>
            <span className="flex-1 truncate text-[13px]">{v.vendor.replace(/^www\./,"")}</span>
            <span className="mono text-[11px]" style={{color:"var(--outline)"}}>{fmtInt(v.count)}</span></label>);})}
          {!vendors.length&&<div className="lbl">no vendors</div>}</div>
        <div className="lbl mt-1.5" style={{fontSize:10}}>{vsel.length?vsel.length+" selected":"all vendors"}</div></div>
      <div><div className="lbl mb-2">Engine Settings</div>
        <div className="grid grid-cols-2 gap-2.5">
          {[["Concurrency","concurrency"],["Timeout (ms)","timeout_ms"],["Batch Size","batch_size"],["Interval (s)","rest_between"]].map(([l,k])=>
            <div key={k}><div className="lbl mb-1" style={{fontSize:10}}>{l}</div>
              <input type="number" className="inp mono" value={cfg[k]} onChange={e=>setCfg({...cfg,[k]:+e.target.value})}/></div>)}</div></div>
      <div className="tile flex items-center justify-between px-3.5 py-3">
        <div><div className="text-[13px] font-semibold">Safe Retry Mode</div><div className="lbl mt-0.5" style={{fontSize:10}}>backoff algorithm active</div></div>
        <Toggle on={cfg.safe_retry} onChange={v=>setCfg({...cfg,safe_retry:v})}/></div>
      <Btn kind="ghost" onClick={()=>{sendCfg({});toast("Config applied","ok")}}><Icon n="check" s={13}/>Apply Config</Btn>
    </div>
    <div className="flex flex-col min-h-0 min-w-0">
      {st.phase!=="idle"&&st.phase!=="done"&&<div className="flex items-center gap-2 mb-3 px-4 py-2.5 rounded-lg text-[12.5px] font-semibold"
        style={{border:"1px solid "+COL.ter+"66",background:COL.ter+"14",color:COL.ter}}>
        <Icon n="alerts" s={14}/>CURRENT PHASE: {st.phase==="safe_retry"?"SAFE-RETRY WINDOW…":"EXTRACTING LIVE PRICING…"}</div>}
      <div className="flex items-center gap-3 mb-4">
        <Btn kind="primary" onClick={()=>run("fresh")} disabled={st.running}><Icon n="play" s={14}/>Run from Start</Btn>
        <Btn kind="ghost" onClick={()=>run("update")} disabled={st.running}><Icon n="refresh" s={14}/>Check Updates</Btn>
        <Btn kind="danger" onClick={abort} disabled={!st.running}><Icon n="stop" s={13}/>Abort</Btn>
        <span className="ml-auto flex items-center gap-2 lbl">{st.running?<span className="w-2 h-2 rounded-full pdot" style={{background:COL.sec}}/>:<span className="w-2 h-2 rounded-full" style={{background:"var(--outline)"}}/>}Engine {st.running?"Live":"Idle"}</span>
      </div>
      <div className="grid grid-cols-6 gap-2.5 mb-4">{tiles.map(([k,v,c])=>
        <div key={k} className="tile px-3 py-3"><div className="lbl" style={{fontSize:9.5}}>{k}</div>
          <div className="mono mt-1.5" style={{fontSize:20,fontWeight:600,color:c}}>{v}</div></div>)}</div>
      <div className="flex items-center justify-between mb-1.5"><div className="lbl">Stream Console</div>
        <div className="flex items-center gap-2"><Pill c={COL.primary}>{st.running?"LIVE":"IDLE"}</Pill>
          <button onClick={()=>{setRows([]);apiJSON("/api/pipe/clear_log",{});}} style={{color:"var(--outline)"}}><Icon n="trash" s={14}/></button></div></div>
      <div className="flex justify-between lbl mb-1" style={{fontSize:10}}><span>row {fmtInt(st.current_row)} / {fmtInt(st.total_rows)}</span><span>{pct.toFixed(1)}%</span></div>
      <div className="h-1.5 rounded mb-2 relative overflow-hidden" style={{background:"var(--c-high)"}}><div className="h-full relative" style={{width:pct+"%",background:"var(--primary)"}}>{st.running&&<span className="shine"/>}</div></div>
      <div ref={logRef} className="flex-1 min-h-0 overflow-y-auto card mono" style={{fontSize:11.5,background:"var(--c-lowest,#0e0e10)"}}>
        <table className="w-full"><tbody>{rows.map((e,i)=>{const[t,c]=tag(e);return(
          <tr key={i} className="fadeup" style={{borderBottom:"1px solid var(--c-low)"}}>
            <td className="px-3 py-1.5" style={{color:"var(--outline)",width:78}}>{e.t}</td>
            <td className="px-2 py-1.5" style={{color:"var(--primary2)",width:120}}>[{(e.domain||"?").replace(/^www\./,"").toUpperCase().slice(0,12)}]</td>
            <td className="px-2 py-1.5" style={{color:"var(--on-var)"}}>{trunc(e.url,46)}</td>
            <td className="px-3 py-1.5 text-right" style={{width:62}}><span style={{color:c,fontWeight:600}}>{t}</span></td></tr>);})}
          {!rows.length&&<tr><td className="text-center py-12" style={{color:"var(--outline)"}}>Stream idle — hit Run from Start.</td></tr>}
        </tbody></table></div>
      <div className="lbl mt-2" style={{fontSize:10}}>· {st.message} · SUPABASE-BACKED · TERMINAL V2.4</div>
    </div>
  </div>;
}

/* ===================== REVIEW ===================== */
function Review({admin}){
  const [tab,setTab]=useState("mismatch");const [items,setItems]=useState([]);const [counts,setCounts]=useState({});
  const [sel,setSel]=useState(()=>new Set());const [fxr,setFxr]=useState({USD:0,CAD:0,INR:1});const [busy,setBusy]=useState(false);
  const load=useCallback(async()=>{setBusy(true);const d=await api(`/api/review/items?kind=${tab}`);
    setItems((d.items||[]).map(it=>({...it,_m:it.markup_pct||0})));setCounts(d.counts||{});setSel(new Set());setBusy(false);},[tab]);
  useEffect(()=>{load()},[load]);
  useEffect(()=>{api("/api/fx").then(d=>d.rates&&setFxr(d.rates))},[]);
  const liveInr=it=>{if(it.live_price==null)return null;const c=(it.currency||"INR").toUpperCase();return it.live_price*((c==="INR"||c==="UNKNOWN")?1:(fxr[c]||1));};
  const diffPct=it=>{const li=liveInr(it);return(li!=null&&it.base_price)?((li-it.base_price)/it.base_price*100):null;};
  const finalOf=it=>{if(it.final_price!=null)return it.final_price;const li=liveInr(it);return li==null?null:li*(1+(+it._m||0)/100);};
  const setM=(id,v)=>setItems(x=>x.map(it=>it.id===id?{...it,_m:v}:it));
  const decide=async(it,dec)=>{if(!admin)return toast("Admin only","err");const r=await apiJSON("/api/review/decide",{row:it.id,decision:dec,ref:"live",markup_pct:it._m,convert:true});
    r.ok?toast(dec==="approved"?`Approved → ${inr(r.final_price)}`:"Flagged","ok"):toast(r.error||"Failed","err");load();};
  const approveSelected=async()=>{if(!admin)return toast("Admin only","err");const ids=[...sel];if(!ids.length)return toast("Select rows first","err");
    for(const it of items.filter(x=>sel.has(x.id)))await apiJSON("/api/review/decide",{row:it.id,decision:"approved",ref:"live",markup_pct:it._m,convert:true});

        <Btn kind="primary" sm onClick={approveSelected} disabled={!admin}><Icon n="check" s={13}/>Approve Selected</Btn></div>
    </div>

      <button key={k} onClick={()=>setTab(k)} className="navi flex items-center gap-2 px-4 py-2 rounded-md text-[13px] font-semibold"
        style={{background:tab===k?COL.primary:"var(--c-low)",color:tab===k?"#fff":"var(--on-var)",border:"1px solid "+(tab===k?COL.primary:"var(--ov)")}}>
        {l}<span className="mono" style={{fontSize:10,padding:"1px 6px",borderRadius:4,background:tab===k?"rgba(255,255,255,.2)":c+"22",color:tab===k?"#fff":c}}>{fmtInt(n)}</span></button>)}</div>
    <div className="card overflow-auto">
      <table className="w-full text-[12.5px]"><thead><tr className="lbl" style={{background:"var(--surface)"}}>
        <th className="px-3 py-2.5 text-left"><span onClick={()=>setSel(allSel?new Set():new Set(items.map(i=>i.id)))} className="inline-flex cursor-pointer" style={{width:15,height:15,borderRadius:3,border:"1px solid var(--outline)",background:allSel?COL.primary:"transparent"}}>{allSel&&<Icon n="check" s={11} c="#fff"/>}</span></th>
        {["Brand","Product ID","Base","Live (site)","≈₹ Live","Diff %","Markup %","Final ₹","Status","Actions"].map(h=>
          <th key={h} className="px-3 py-2.5 text-left whitespace-nowrap">{h}</th>)}</tr></thead>
        <tbody>{items.map(it=>{const li=liveInr(it),dp=diffPct(it),up=(dp||0)>0,f=finalOf(it);const status=it.decision==="approved"?["APPROVED",COL.sec]:it.decision==="rejected"?["FLAGGED",COL.ter]:["NEEDS REVIEW",COL.ter];return(
          <tr key={it.id} style={{borderTop:"1px solid var(--c-low)"}}>
            <td className="px-3 py-2.5"><span onClick={()=>toggle(it.id)} className="inline-flex cursor-pointer" style={{width:15,height:15,borderRadius:3,border:"1px solid var(--outline)",background:sel.has(it.id)?COL.primary:"transparent"}}>{sel.has(it.id)&&<Icon n="check" s={11} c="#fff"/>}</span></td>
            <td className="px-3 py-2.5"><div className="flex items-center gap-2"><BrandDot b={it.brand}/><span className="text-[12px]">{it.brand.replace(/^www\./,"")}</span></div></td>
            <td className="px-3 py-2.5 mono" style={{color:"var(--outline)",fontSize:11}}>{pid(it.url)}</td>
            <td className="px-3 py-2.5 mono text-right">{inr(it.base_price)}</td>
            <td className="px-3 py-2.5 mono text-right">{fmt(it.live_price)} <span style={{color:"var(--outline)",fontSize:10}}>{it.currency}</span></td>
            <td className="px-3 py-2.5 mono text-right">{inr(li)}</td>
            <td className="px-3 py-2.5 mono text-right" style={{color:up?COL.err:COL.sec}}>{dp!=null?(up?"+":"")+dp.toFixed(1)+"%":"—"}</td>
            <td className="px-3 py-2.5"><input type="number" value={it._m} onChange={e=>setM(it.id,e.target.value)} className="inp mono text-right" style={{width:64,padding:"5px 7px"}}/></td>
            <td className="px-3 py-2.5 mono text-right font-semibold" style={{color:it.final_price!=null?COL.sec:"var(--on)"}}>{inr(f)}</td>
            <td className="px-3 py-2.5"><Pill c={status[1]}>{status[0]}</Pill></td>
            <td className="px-3 py-2.5"><div className="flex gap-2 items-center">
              <button onClick={()=>decide(it,"approved")} title="Approve" style={{color:COL.sec}}><Icon n="check" s={16}/></button>
              <button onClick={()=>decide(it,"rejected")} title="Flag" style={{color:COL.ter}}><Icon n="flag" s={15}/></button></div></td></tr>);})}
          {!items.length&&<tr><td colSpan="11" className="text-center py-12" style={{color:"var(--outline)"}}>{busy?"Loading…":"Nothing here."}</td></tr>}
        </tbody></table></div>
    <div className="grid grid-cols-3 gap-3 mt-4">
      <div className="card p-4"><div className="lbl">Queue Velocity</div><div style={{fontSize:24,fontWeight:600,color:COL.sec,marginTop:6}}>{matchRate}% Match Rate</div></div>
      <div className="card p-4"><div className="lbl">Awaiting Approval</div><div style={{fontSize:24,fontWeight:600,marginTop:6}}>{fmtInt(counts.awaiting)} items</div></div>
      <div className="p-4 rounded-lg" style={{background:COL.primary}}><div className="lbl" style={{color:"rgba(255,255,255,.7)"}}>Auto-Approval Safe Zone</div>
        <div style={{fontSize:24,fontWeight:700,color:"#fff",marginTop:6}}>{matchRate}%</div>
        <div className="text-[11px] mt-1" style={{color:"rgba(255,255,255,.8)"}}>{fmtInt(counts.matched)} matched of {fmtInt(counts.total)}</div></div>
    </div>
  </div>;
}

/* ===================== ALERTS ===================== */
function Alerts(){
  const [thr,setThr]=useState(15);const [dir,setDir]=useState("all");const [d,setD]=useState({items:[],total:0,drops:0,spikes:0});
  const load=useCallback(async()=>{const r=await api(`/api/alerts?threshold=${thr}&direction=${dir}`);setD(r);},[thr,dir]);
  useEffect(()=>{load()},[load]);
  const seg=[["all","All Movements"],["drop","Drops"],["spike","Spikes"]];
  // velocity: bucket by hour-of-day from created_at
  const buckets={};(d.items||[]).forEach(it=>{const h=(it.created_at||"").slice(11,13)||"--";buckets[h]=(buckets[h]||0)+1;});
  const vlabels=Object.keys(buckets).sort().slice(-8);const vdata=vlabels.map(h=>buckets[h]);
  // distribution: share by brand
  const bd={};(d.items||[]).forEach(it=>{const b=(it.brand||"?").replace(/^www\./,"");bd[b]=(bd[b]||0)+1;});
  const dist=Object.entries(bd).sort((a,b)=>b[1]-a[1]).slice(0,4);const dtot=(d.items||[]).length||1;
  const dc=[COL.sec,COL.ter,COL.primary,COL.out];
  return <div className="h-full min-h-0 overflow-auto">
    <h1 style={{fontSize:30,fontWeight:600,letterSpacing:"-.02em"}}>Price Movement Alerts</h1>
    <div className="text-[13px] mt-1 mb-5" style={{color:"var(--on-var)"}}>Real-time volatility monitoring across designer domains.</div>
    <div className="card p-4 flex items-end gap-6 flex-wrap mb-5">
      <div><div className="lbl mb-1.5">Movement Threshold</div>
        <div className="flex items-center gap-2"><input type="number" className="inp mono" style={{width:90}} value={thr} onChange={e=>setThr(e.target.value)}/><span className="lbl">%</span></div></div>
      <div><div className="lbl mb-1.5">Filter Type</div>
        <div className="flex rounded-md overflow-hidden" style={{border:"1px solid var(--ov)"}}>{seg.map(([k,l])=>
          <button key={k} onClick={()=>setDir(k)} className="navi px-4 py-2 text-[12.5px] font-semibold"
            style={{background:dir===k?COL.primary:"var(--c-low)",color:dir===k?"#fff":"var(--on-var)"}}>{l}</button>)}</div></div>
      <div className="ml-auto"><div className="lbl mb-1.5">Time Window</div>
        <div className="flex items-center gap-2"><span className="inp flex items-center gap-2" style={{width:160}}><Icon n="clock" s={13} c="var(--outline)"/>Latest run</span>
          <Btn kind="ghost" sm onClick={load}><Icon n="refresh" s={13}/></Btn></div></div>
    </div>
    <div className="card overflow-auto mb-5">
      <table className="w-full text-[12.5px]"><thead><tr className="lbl">{["Timestamp","Brand","Product ID","Previous","New Price","Movement","Action"].map(h=>
        <th key={h} className="px-3 py-2.5 text-left whitespace-nowrap">{h}</th>)}</tr></thead>
        <tbody>{(d.items||[]).slice(0,40).map((it,i)=>{const up=it.direction==="spike",c=up?COL.err:COL.sec;return(
          <tr key={i} style={{borderTop:"1px solid var(--c-low)"}}>
            <td className="px-3 py-2.5 mono" style={{color:"var(--outline)",fontSize:11}}>{(it.created_at||"").slice(0,19).replace("T"," ")}</td>
            <td className="px-3 py-2.5"><div className="flex items-center gap-2"><BrandDot b={it.brand}/><span className="text-[12px]">{(it.brand||"").replace(/^www\./,"")}</span></div></td>
            <td className="px-3 py-2.5 mono" style={{color:"var(--primary2)",fontSize:11}}>{pid(it.url)}</td>
            <td className="px-3 py-2.5 mono text-right">{inr(it.prev)}</td>
            <td className="px-3 py-2.5 mono text-right">{inr(it.live_price)}</td>
            <td className="px-3 py-2.5"><span className="inline-flex items-center gap-1 mono font-semibold" style={{color:c}}><Icon n={up?"up":"down"} s={13}/>{it.pct>0?"+":""}{it.pct}%</span></td>
            <td className="px-3 py-2.5"><Btn kind="ghost" sm onClick={()=>window.open(it.url,"_blank")}>Quick View</Btn></td></tr>);})}
          {!(d.items||[]).length&&<tr><td colSpan="7" className="text-center py-12" style={{color:"var(--outline)"}}>No movements ≥ {thr}% — run the pipeline twice to compare.</td></tr>}
        </tbody></table></div>
    <div className="grid grid-cols-2 gap-3">
      <div className="card p-4"><div className="lbl mb-3">Alert Velocity (by hour)</div>
        <ChartBox type="bar" h={180} labels={vlabels.map(h=>h+":00")} datasets={[{data:vdata,backgroundColor:COL.sec+"cc",borderRadius:4}]}/></div>
      <div className="card p-4"><div className="lbl mb-3">Volatility Distribution</div>
        <div className="space-y-3 pt-1">{dist.map(([b,n],i)=>{const p=Math.round(n/dtot*100);return(
          <div key={b}><div className="flex justify-between text-[12px] mb-1"><span>{b}</span><span className="mono" style={{color:dc[i]}}>{p}%</span></div>
            <div className="h-1.5 rounded" style={{background:"var(--c-high)"}}><div className="h-full rounded" style={{width:p+"%",background:dc[i]}}/></div></div>);})}
          {!dist.length&&<div className="lbl">no data yet</div>}</div></div>
    </div>
  </div>;
}

        <tbody>{sessions.map((s,i)=>(<tr key={i} style={{borderTop:"1px solid var(--c-low)"}}>
          <td className="px-4 py-2.5">{s.email}</td><td className="px-4 py-2.5"><Pill c={s.role==="owner"?COL.primary:s.role==="admin"?COL.sec:COL.out}>{s.role}</Pill></td>
          <td className="px-4 py-2.5 mono" style={{color:"var(--outline)"}}>{s.ip}</td>
          <td className="px-4 py-2.5">{s.active?<span style={{color:COL.sec}}>● active</span>:<span style={{color:"var(--outline)"}}>idle</span>}</td>
          <td className="px-4 py-2.5 mono">{s.idle_s}s</td><td className="px-4 py-2.5 mono">{Math.floor(s.age_s/60)}m</td></tr>))}
          {!sessions.length&&<tr><td colSpan="6" className="text-center py-8" style={{color:"var(--outline)"}}>No active sessions.</td></tr>}
        </tbody></table></div>
    <div className="card overflow-auto">
      <div className="flex items-center gap-2 px-4 py-3 lbl" style={{borderBottom:"1px solid var(--ov)"}}><Icon n="users" s={14}/>Users ({users.length})</div>
      <table className="w-full text-[12.5px]"><thead><tr className="lbl">{["Email","Role","Created","Actions"].map(h=><th key={h} className="px-4 py-2.5 text-left">{h}</th>)}</tr></thead>
        <tbody>{users.map(u=>(<tr key={u.id} style={{borderTop:"1px solid var(--c-low)"}}>
          <td className="px-4 py-2.5">{u.email}</td>
          <td className="px-4 py-2.5"><select className="inp" style={{width:110,padding:"5px 7px"}} value={u.role} onChange={e=>setRole(u.email,e.target.value)}>
            <option value="owner">owner</option><option value="admin">admin</option><option value="viewer">viewer</option></select></td>
          <td className="px-4 py-2.5 mono" style={{color:"var(--outline)",fontSize:11}}>{(u.created_at||"").slice(0,10)}</td>
          <td className="px-4 py-2.5">{u.email!==(me&&me.email)&&<button onClick={()=>del(u.email)} style={{color:COL.err}}><Icon n="trash" s={15}/></button>}</td></tr>))}
        </tbody></table></div>
  </div>;
}

/* ===================== SHELL ===================== */
function App(){
  const [view,setView]=useState("pipeline");
  const [me,setMe]=useState(null);const [run,setRun]=useState({running:false});
  const admin=!!(me&&(me.role==="admin"||me.role==="owner"));
  useEffect(()=>{api("/api/me").then(d=>{if(d.email)setMe(d)})},[]);
  useEffect(()=>{const t=setInterval(async()=>{const d=await api("/api/pipe/status?cursor=999999999");if(d.running!==undefined)setRun(d)},5000);return()=>clearInterval(t)},[]);
  const nav=[["pipeline","Pipeline","pipeline"],["review","Review","review"],["history","History","clock"],["alerts","Alerts","alerts"],["integrations","Integrations","integrations"]];
  return <div className="flex h-screen" style={{background:"var(--bg)"}}>
    <Toaster/>
    <nav className="shrink-0 flex flex-col p-3" style={{width:220,background:"var(--surface)",borderRight:"1px solid var(--ov)"}}>
      <div className="flex items-center gap-2.5 px-2 py-2 mb-5">
        <div style={{width:30,height:30,borderRadius:7,background:"var(--primary)"}}/>
        <div><div style={{fontWeight:700,fontSize:15}}>MBO Tracker</div><div className="lbl" style={{fontSize:9.5}}>Terminal v2.4</div></div></div>
      {nav.map(([k,l,ic])=><button key={k} onClick={()=>setView(k)} className="navi flex items-center gap-3 px-3 py-2.5 rounded-md text-[13.5px] font-semibold mb-1"
        style={{background:view===k?"var(--c)":"transparent",color:view===k?"var(--on)":"var(--on-var)",borderLeft:"2px solid "+(view===k?"var(--primary)":"transparent")}}>
        <Icon n={ic} s={17}/>{l}</button>)}
      <div className="mt-auto pt-3" style={{borderTop:"1px solid var(--ov)"}}>
        <button onClick={()=>setView("settings")} className="navi flex items-center gap-3 px-3 py-2.5 rounded-md text-[13px] font-semibold w-full" style={{color:view==="settings"?"var(--on)":"var(--on-var)",background:view==="settings"?"var(--c)":"transparent"}}><Icon n="settings" s={16}/>Settings</button>
        <button className="navi flex items-center gap-3 px-3 py-2.5 rounded-md text-[13px] font-semibold w-full" style={{color:"var(--on-var)"}}><Icon n="support" s={16}/>Support</button></div>
    </nav>
    <div className="flex-1 flex flex-col min-w-0">
      <div className="flex items-center gap-4 px-5 py-3" style={{background:"var(--surface)",borderBottom:"1px solid var(--ov)"}}>
        <div className="flex items-center gap-2 px-3 py-2 rounded-lg flex-1 max-w-md" style={{background:"var(--c-low)",border:"1px solid var(--ov)"}}>
          <Icon n="search" s={14} c="var(--outline)"/><input className="bg-transparent text-[13px] w-full" style={{color:"var(--on)"}} placeholder="Search MBO pricing terminal…"/></div>
        {run.running&&<span className="flex items-center gap-2 lbl" style={{color:COL.ter}}><span className="w-2 h-2 rounded-full pdot" style={{background:COL.ter}}/>Run active</span>}
        <div className="ml-auto flex items-center gap-3">
          <button style={{color:"var(--outline)"}}><Icon n="share" s={17}/></button>
          <button style={{color:"var(--outline)"}}><Icon n="card" s={17}/></button>
          {me&&<><div className="text-right leading-tight"><div className="text-[12.5px] mono">{me.email.split("@")[0]}</div>
            <div className="lbl" style={{fontSize:9,color:me.role==="owner"?COL.primary:me.role==="admin"?COL.sec:COL.out}}>{me.role.toUpperCase()}</div></div>
            <div className="flex items-center justify-center" style={{width:32,height:32,borderRadius:"50%",background:"var(--primary)",color:"#fff",fontWeight:700,fontSize:13}}>{(me.email||"?")[0].toUpperCase()}</div>
            <a href="/logout" title="Sign out" style={{color:"var(--outline)"}}><Icon n="logout" s={16}/></a></>}
        </div></div>
      <div className="flex-1 min-h-0 p-6">
        {view==="pipeline"&&<Pipeline admin={admin}/>}
        {view==="review"&&<Review admin={admin}/>}
        {view==="history"&&<History admin={admin}/>}
        {view==="alerts"&&<Alerts/>}
        {view==="integrations"&&<Integrations admin={admin}/>}
        {view==="settings"&&<Settings me={me}/>}
      </div></div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
